<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abhinav's Cool Site</title>
    <style>
        /* Thodi si mast CSS design ke liye */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(45deg, #0f0c29, #302b63, #24243e);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
        }

        .card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            text-align: center;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        h1 { margin-bottom: 10px; color: #00d2ff; }
        p { font-size: 1.2rem; opacity: 0.8; }
        
        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 25px;
            background: #00d2ff;
            color: #1a1a1a;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn:hover {
            transform: scale(1.1);
            background: #fff;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>Abhinav Code 577</h1>
        <p>BCA Student | Future Web Developer</p>
        <p>Ye meri pehli website hai jo maine Git se upload ki hai!</p>
        <a href="#" class="btn">Aur Jaano</a>
    </div>

</body>
</html>
